services:
  # The take-home's mock third-party provider (starter-kit/mock-provider.js).
  # Zero npm dependencies (Node built-ins only), so it runs directly off the
  # plain node image rather than needing its own Dockerfile.
  mock-provider:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./starter-kit:/app/starter-kit:ro
    command: ["node", "starter-kit/mock-provider.js"]
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 2s
      timeout: 2s
      retries: 15

  # The NestJS HTTP API (see Dockerfile). The same image also runs the CLI —
  # see the README for `docker compose run --rm api node dist/cli.js enrich ...`.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      MOCK_PROVIDER_URL: "http://mock-provider:4000"
      MOCK_PROVIDER_API_KEY: "demo-token"
    depends_on:
      mock-provider:
        condition: service_healthy
    volumes:
      - ./starter-kit:/app/starter-kit:ro
      - ./data:/app/data
